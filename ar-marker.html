<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="마커 기반 AR로 도형을 학습하세요">
  <title>AR 학습 (마커) - 도형 왕국</title>
  
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  
  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ar-ui.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="ar-page">
  <!-- AR UI 오버레이 -->
  <div class="ar-overlay">
    <!-- 상단 정보 -->
    <div class="ar-header">
      <button class="btn-back" onclick="history.back()">
        <span>← 뒤로</span>
      </button>
      <div class="ar-info">
        <h2 id="level-title">레벨 1: 평면 도형 기초</h2>
        <p id="level-desc">마커를 카메라에 비춰보세요</p>
      </div>
    </div>
    
    <!-- 도형 정보 패널 -->
    <div class="shape-info" id="shape-info">
      <!-- JavaScript로 동적 생성됨 -->
    </div>
    
    <!-- 컨트롤 버튼 -->
    <div class="ar-controls">
      <button class="control-btn" id="btn-rotate" title="회전">
        <span>🔄</span>
      </button>
      <button class="control-btn" id="btn-info" title="정보" onclick="toggleShapeInfo()">
        <span>ℹ️</span>
      </button>
      <button class="control-btn" id="btn-help" title="도움말" onclick="showHelp()">
        <span>❓</span>
      </button>
      <button class="control-btn" id="btn-quiz" title="퀴즈" onclick="arController && arController.startQuiz()">
        <span>📝</span>
      </button>
    </div>
    
    <!-- 마커 감지 상태 -->
    <div class="marker-status" id="marker-status">
      <p>📷 마커를 찾는 중...</p>
    </div>
    
    <!-- 도움말 모달 -->
    <div class="modal" id="help-modal" style="display: none;">
      <div class="modal-content">
        <h3>AR 사용 방법</h3>
        <ol>
          <li>카메라 권한을 허용해주세요</li>
          <li>마커를 인쇄하거나 화면에 띄워주세요</li>
          <li>카메라를 마커에 비춰주세요</li>
          <li>도형이 나타나면 정보를 확인하세요</li>
        </ol>
        <p><strong>팁:</strong> 밝은 곳에서 사용하면 더 잘 인식됩니다!</p>
        <button class="btn btn-primary" onclick="closeHelp()">확인</button>
      </div>
    </div>
  </div>

  <!-- A-Frame AR 씬 -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    loading-screen="enabled: false">
    
    <!-- 카메라 -->
    <a-entity camera></a-entity>
    
    <!-- 마커 1: Hiro (기본 테스트용) -->
    <a-marker preset="hiro" id="marker-hiro">
      <!-- 도형이 JavaScript로 동적 생성됨 -->
    </a-marker>
    
    <!-- 마커 2: Kanji -->
    <a-marker preset="kanji" id="marker-kanji">
      <!-- 도형이 JavaScript로 동적 생성됨 -->
    </a-marker>
    
    <!-- 마커 3: Letter A (원 등 추가 도형) -->
    <a-marker preset="letterA" id="marker-letterA">
      <!-- 도형이 JavaScript로 동적 생성됨 -->
    </a-marker>
    
    <!-- 커스텀 마커 (레벨별) - 나중에 마커 파일 생성 후 활성화 -->
    <!-- 
    <a-marker type="pattern" url="assets/markers/level1-marker.patt" id="marker-level1">
    </a-marker>
    -->
  </a-scene>

  <!-- JavaScript -->
  <script src="js/utils.js"></script>
  <script src="js/geometry-shapes.js"></script>
  <script src="js/ar-marker.js"></script>
  
  <script>
    // UI 함수들
    function toggleShapeInfo() {
      const infoPanel = document.getElementById('shape-info');
      if (infoPanel.classList.contains('visible')) {
        infoPanel.classList.remove('visible');
      } else {
        infoPanel.classList.add('visible');
      }
    }
    
    function closeShapeInfo() {
      document.getElementById('shape-info').classList.remove('visible');
    }
    
    function showHelp() {
      document.getElementById('help-modal').style.display = 'flex';
    }
    
    function closeHelp() {
      document.getElementById('help-modal').style.display = 'none';
    }
    
    // 페이지 로드 시 도움말 표시
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        showHelp();
      }, 1000);
    });
  </script>
</body>
</html>
